<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preparing Your Application</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f7f8fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#fff;
    width:420px;
    max-width:90%;
    border-radius:18px;
    padding:40px;
    text-align:center;
    box-shadow:0 15px 45px rgba(0,0,0,.08);
}

.spinner{
    width:70px;
    height:70px;
    border:6px solid #ececec;
    border-top:6px solid #111;
    border-radius:50%;
    margin:0 auto 25px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

h2{
    margin:0;
    color:#111;
}

p{
    color:#666;
    line-height:1.6;
}

.progress{
    height:10px;
    background:#ececec;
    border-radius:20px;
    overflow:hidden;
    margin-top:25px;
}

.bar{
    height:100%;
    width:0%;
    background:#111;
    animation:fill 30s linear forwards;
}

@keyframes fill{
    to{
        width:100%;
    }
}

#timer{
    margin-top:18px;
    font-weight:600;
    color:#111;
}
</style>
</head>

<body>

<div class="card">

<div class="spinner"></div>

<h2>Preparing Your Application</h2>

<p>
Please wait while we prepare your client file.<br>
This process may take up to 30 seconds.
</p>

<div class="progress">
<div class="bar"></div>
</div>

<div id="timer">30 seconds remaining</div>

</div>

<script>

let seconds=30;

const timer=document.getElementById("timer");

const interval=setInterval(()=>{

seconds--;

timer.innerHTML=seconds+" seconds remaining";

if(seconds<=0){

clearInterval(interval);

window.location.href="application-created.html";

}

},1000);

</script>

</body>
</html>
